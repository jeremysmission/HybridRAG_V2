    definition_short: "industry enterprise vulnerability scanning and assessment capability."
    regex_safe: true
    retrieval_expand: true
    collision_risk: low
    sources:
      - source_id: nist_csrc_glossary
        citation: "https://csrc.security standard.gov/Glossary"

