# Year canonicalizer handled in code (src/query/aggregation_executor.py parse_year_range).
# Accepted formats: 2024, CY2024, FY24, FY2024, 04/2024, Q1-2024, Q1 2024, 2024-Q1,
# "from 2022-2025", "between X and Y", "in 2024", "past N years".

part_number_patterns:
  - 'SEMS3D-\d+'
  - '[A-Z]{2,4}-\d{3,5}'
  - '[A-Z]{2,4}\d{3,5}'
  - 'TC\s?\d{2}-\d{2}-\d{2}-\d{3}'
