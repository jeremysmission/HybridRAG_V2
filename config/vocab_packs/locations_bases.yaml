pack_id: locations_bases
pack_name: Locations and Bases
domain: locations_bases
version: "2026-04-15"
release_tier: deployable
status: active
description: >-
  Sanitized controlled vocabulary for military installations — Space
  Force bases, Air Force bases, and joint bases — with canonical names,
  legacy names, service affiliation, type, and parent geography. Sources
  are official public sites: US Space Force locations, Space Systems
  Command "where we operate", and the Air Force base locator.

provenance:
  deployable_sources:
    - source_id: ussf_locations
      source_kind: official_public
      citation: "https://www.spaceforce.mil/About-Us/Space-Force-Locations/I/"
    - source_id: ssc_where_we_operate
      source_kind: official_public
      citation: "https://www.ssc.spaceforce.mil/About-Us/Where-We-Operate"
    - source_id: usaf_base_locator
      source_kind: official_public
      citation: "https://www.airforce.com/ways-to-serve/locations"
    - source_id: patrick_rename_announcement
      source_kind: official_public
      citation: "https://www.spaceforce.mil/News/Article-Display/Article/2445557/patrick-afb-cape-canaveral-afs-renamed-as-space-force-installations/"
  notes: "Only deployable_sources ship with this pack artifact."

entry_defaults:
