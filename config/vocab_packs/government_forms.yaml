pack_id: government_forms
pack_name: Government Forms
domain: government_forms
version: "2026-04-15"
release_tier: deployable
status: active
description: >-
  Sanitized controlled vocabulary for federal forms commonly encountered
  in DoD logistics, personnel, and security workflows. Each entry
  captures canonical form number, title, aliases, common fields, and
  structural cues useful for form-aware extraction. Sources are the
  GSA Forms Library, DoW Forms Management Program, and OPM federal
  forms references.

provenance:
  deployable_sources:
    - source_id: gsa_forms_library
      source_kind: official_public
      citation: "https://www.gsa.gov/reference/forms"
    - source_id: whs_dd_forms
      source_kind: official_public
      citation: "https://www.esd.whs.mil/Directives/forms/fmo_poc/"
    - source_id: opm_federal_investigation_forms
      source_kind: official_public
      citation: "https://www.opm.gov/forms/federal-investigation-forms/"
    - source_id: opm_personnel_documentation
      source_kind: official_public
      citation: "https://www.opm.gov/policy-data-oversight/data-analysis-documentation/personnel-documentation/"
  notes: "Only deployable_sources ship with this pack artifact."

entry_defaults:
  regex_safe: true
  retrieval_expand: true
  collision_risk: low
  source_kind: official_public

entries:
  - term_id: forms.dd.1149
    canonical: DD Form 1149
    kind: form
    domain: government_forms
    category: shipping_and_invoice
    aliases: [DD1149, "DD Form 1149", "Requisition and Invoice/Shipping Document"]
    regex_safe: true
    retrieval_expand: true
    collision_risk: low
    source_kind: official_public
    form_number: "DD Form 1149"
    form_title: "Requisition and Invoice/Shipping Document"
    common_fields:
      - ship_to
      - bill_to
      - requisition_number
      - quantity
      - unit_price
      - nsn
      - item_description
      - signature_block
    structural_cues:
      - line_items_table
      - signature_block
      - routing_block
      - header_requisition_number
    sources:
      - source_id: whs_dd_forms
        citation: "https://www.esd.whs.mil/Directives/forms/fmo_poc/"
    notes: "High-value logistics form in DoD supply chain workflows."

