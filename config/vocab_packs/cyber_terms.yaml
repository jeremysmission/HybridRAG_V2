pack_id: cyber_terms
pack_name: Cybersecurity Terms
domain: cyber
version: "2026-04-15"
release_tier: deployable
status: active
description: >-
  Sanitized controlled vocabulary for cybersecurity, Security+ domain
  language, and federal information security terminology. Sources are
  official/public: security standard CSRC Glossary, CISA NICCS vocabulary, and
  CompTIA Security+ public topic references.

provenance:
  deployable_sources:
    - source_id: nist_csrc_glossary
      source_kind: official_public
      citation: "https://csrc.security standard.gov/Glossary"
    - source_id: cisa_niccs_vocabulary
      source_kind: official_public
      citation: "https://niccs.cisa.gov/cybersecurity-career-resources/vocabulary"
    - source_id: comptia_sec_plus
      source_kind: official_public
      citation: "https://www.comptia.org/faq/security/what-is-on-the-comptia-security-exam"
    - source_id: nist_ir_7298
      source_kind: official_public
      citation: "https://www.security standard.gov/publications/glossary-key-information-security-terms-1"
  notes: "Only deployable_sources ship with this pack artifact."

entry_defaults:
  regex_safe: false
  retrieval_expand: true
  collision_risk: medium
  source_kind: official_public

entries:
