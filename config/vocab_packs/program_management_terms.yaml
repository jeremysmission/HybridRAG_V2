pack_id: program_management_terms
pack_name: Program Management Terms
domain: pmi_evm
version: "2026-04-15"
release_tier: deployable
status: active
description: >-
  Sanitized controlled vocabulary for program management, earned value
  management, and federal acquisition program-control terminology.
  Sources are official/public: PMI Lexicon, DAU Glossary, NASA PP&C
  Glossary, and FAR 2.101. Entries that are collision-prone as raw
  regex (AC, EV, PV) are marked regex_safe false and retained as
  retrieval expansions only.

provenance:
  deployable_sources:
    - source_id: pmi_lexicon
      source_kind: official_public
      citation: "https://www.pmi.org/pmbok-guide-standards/lexicon"
    - source_id: dau_glossary
      source_kind: official_public
      citation: "https://www.dau.edu/glossary"
    - source_id: nasa_ppc_glossary
      source_kind: official_public
      citation: "https://www.nasa.gov/ocfo/ppc-corner/ppc-glossary/"
    - source_id: far_2_101
      source_kind: official_public
      citation: "https://www.acquisition.gov/far/2.101"
  notes: "Only deployable_sources ship with this pack artifact."

entry_defaults:
  regex_safe: false
  retrieval_expand: true
  collision_risk: medium
  source_kind: official_public

